// Adventures Toy System — конфиг игрушек
// ---------------------------------------------------------------
// Параметры игрушки:
//   model      - путь к модели (от папки cstrike/)
//   rarity     - редкость: common | rare | epic | legendary
//   skin       - номер скина
//   body       - номер bodygroup
//   sequence   - номер анимации (0 = статика)
//   framerate  - скорость анимации (1.0 = нормальная)
//   sound      - звук подбора (путь от папки sound/, необязательно)
// ---------------------------------------------------------------
// Секция "weights" задаёт шансы выпадения каждой редкости.
// Чем выше число — тем чаще выпадает. Минимум 1.
// Legendary: максимум 1 штука на всю карту одновременно.
// ---------------------------------------------------------------

"weights"
{
    "common"    "100"
    "rare"      "40"
    "epic"      "20"
    "legendary" "5"
}

